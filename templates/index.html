<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Menu</title>
<!-- Replace with your chosen fonts, then update font_display/font_body in config.js defaultTheme -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
/* ── CSS VARIABLES (theme engine) ─────────────────────────── */
/* These are FOUC-prevention fallbacks only — applyTheme() overwrites them at runtime.
   Set your real defaults in config.js defaultTheme, not here. */
:root {
  --bg:        #FFFFFF;
  --bg2:       #F8F8F8;
  --bg3:       #EFEFEF;
  --surface:   #FFFFFF;
  --surface2:  #F8F8F8;
  --primary:   #1A1A1A;
  --primary2:  #2A2A2A;
  --accent:    #E67E22;
  --accent2:   #F39C12;
  --text:      #1A1A1A;
  --text2:     #555555;
  --text3:     #999999;
  --green:     #1FAD5A;
  --green2:    #25D366;
  --red:       #C0392B;
  --border:    rgba(0,0,0,0.1);
  --border2:   rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.16);
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', sans-serif;
  --closed-overlay: 0;
}

/* ── RESET ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── CLOSED BANNER ───────────────────────────────────────── */
.closed-banner {
  display: none;
  background: var(--red);
  color: #fff;
  text-align: center;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.closed-banner.visible { display: block; }

/* ── HEADER ──────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.logo-wrap { display: flex; align-items: center; gap: 10px; }
.logo-img {
  width: 40px; height: 40px;
  border-radius: 10px;
  object-fit: cover;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--accent);
  font-weight: 900;
  overflow: hidden;
}
.logo-img img { width: 100%; height: 100%; object-fit: cover; }
.logo-text {}
.logo-name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -0.3px;
}
.logo-slogan {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: 2px;
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.status-pill.open {
  background: rgba(31,173,90,0.1);
  color: var(--green);
  border: 1px solid rgba(31,173,90,0.2);
}
.status-pill.closed {
  background: rgba(192,57,43,0.1);
  color: var(--red);
  border: 1px solid rgba(192,57,43,0.2);
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
.status-pill.open .status-dot { background: var(--green); }
.status-pill.closed .status-dot { background: var(--red); animation: none; }
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.hours-bar {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hours-bar svg { flex-shrink: 0; }

/* ── CATEGORY NAV ────────────────────────────────────────── */
.cat-nav {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-top: 1px solid var(--border2);
  margin: 0 -20px;
  padding: 0 20px;
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.cat-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── MAIN CONTENT ────────────────────────────────────────── */
.main { padding-bottom: 120px; }

/* ── SECTION ─────────────────────────────────────────────── */
.section {
  padding: 28px 20px 8px;
  scroll-margin-top: 130px;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 900;
  color: var(--primary);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
  line-height: 1.1;
}
.section-sub {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 16px;
  font-style: italic;
}

/* ── SIZE LEGEND ─────────────────────────────────────────── */
.size-legend {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.size-chip {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.3px;
}

/* ── MENU CARD ───────────────────────────────────────────── */
.menu-list { display: flex; flex-direction: column; gap: 2px; }

.menu-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.menu-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}
.menu-card.has-items::before { opacity: 1; }
.menu-card.unavailable { opacity: 0.45; pointer-events: none; }
.menu-card:active { background: var(--surface2); transform: scale(0.995); }

.card-img {
  width: 56px; height: 56px;
  border-radius: 10px;
  object-fit: cover;
  background: var(--bg3);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

.card-body { flex: 1; min-width: 0; }
.card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-desc {
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-prices {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.price-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.price-sz { font-size: 8px; font-weight: 700; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
.price-val { font-size: 13px; font-weight: 700; color: var(--accent); line-height: 1.1; }
.price-single { font-size: 15px; font-weight: 700; color: var(--accent); }
.unavail-badge {
  font-size: 9px;
  font-weight: 700;
  background: var(--bg3);
  color: var(--text3);
  padding: 2px 8px;
  border-radius: 6px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── QTY CONTROL ─────────────────────────────────────────── */
.qty-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.qty-control {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.qty-btn {
  width: 28px; height: 28px;
  border: none;
  background: none;
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  line-height: 1;
}
.qty-btn:active { background: var(--bg3); }
.qty-btn.add-first {
  width: 32px; height: 32px;
  background: var(--accent);
  color: #fff;
  border-radius: 20px;
  font-size: 18px;
}
.qty-num {
  min-width: 24px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
}

/* ── DIVIDER ─────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border2);
  margin: 8px 0 20px;
}
.subsection-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text2);
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.subsection-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── FRIDAY SPECIAL CARD ─────────────────────────────────── */
.special-wrap {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary2) 100%);
  border-radius: var(--radius-md);
  padding: 20px;
  margin-bottom: 8px;
}
.special-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
}
.special-wrap .menu-card {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.1);
  margin-bottom: 4px;
}
.special-wrap .card-name { color: #fff; }
.special-wrap .price-single { color: var(--accent2); }
.special-wrap .qty-control { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
.special-wrap .qty-btn { color: #fff; }
.special-wrap .qty-num { color: #fff; }
.special-wrap .qty-btn.add-first { background: var(--accent); }

/* ── ADDON ROWS ──────────────────────────────────────────── */
.addon-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  margin-bottom: 4px;
  font-size: 13px;
  color: var(--text2);
}
.addon-price { font-weight: 700; color: var(--accent); }

/* ── FAB CART ────────────────────────────────────────────── */
.fab-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 150;
  width: calc(100% - 40px);
  max-width: 400px;
  pointer-events: none;
}
.fab-btn {
  pointer-events: all;
  width: 100%;
  background: var(--green2);
  color: #fff;
  border: none;
  border-radius: var(--radius-lg);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(37,211,102,0.4);
  transition: all 0.2s;
  transform: translateY(80px);
  opacity: 0;
}
.fab-btn.visible { transform: translateY(0); opacity: 1; }
.fab-btn:active { transform: scale(0.98); }
.fab-left { display: flex; align-items: center; gap: 10px; }
.fab-badge {
  background: rgba(255,255,255,0.25);
  border-radius: 12px;
  padding: 2px 10px;
  font-size: 13px;
  font-weight: 800;
}
.fab-total { font-size: 15px; font-weight: 800; }

/* ── CART SHEET ──────────────────────────────────────────── */
.sheet-bg {
  position: fixed; inset: 0;
  background: rgba(28,17,10,0.6);
  backdrop-filter: blur(4px);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.sheet-bg.open { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  padding: 20px 20px 40px;
  max-height: 88vh;
  overflow-y: auto;
  z-index: 400;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.sheet-bg.open .sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.sheet-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  color: var(--primary);
  margin-bottom: 4px;
}
.sheet-count { font-size: 12px; color: var(--text3); margin-bottom: 18px; }

.cart-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.cart-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--bg2);
  border-radius: var(--radius-sm);
}
.cart-row-info { flex: 1; min-width: 0; }
.cart-row-name { font-size: 13px; font-weight: 600; color: var(--text); }
.cart-row-size { font-size: 11px; color: var(--text3); }
.cart-row-price { font-size: 14px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.cart-row-del {
  width: 28px; height: 28px;
  border: none; background: none;
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: background 0.15s;
}
.cart-row-del:active { background: var(--bg3); }

.cart-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.cart-total-label { font-size: 13px; color: var(--text2); font-weight: 500; }
.cart-total-val { font-size: 20px; font-weight: 900; color: var(--primary); font-family: var(--font-display); }

.form-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 6px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
.form-textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text);
  outline: none;
  resize: none;
  height: 70px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.form-textarea:focus { border-color: var(--accent); }
.form-textarea::placeholder { color: var(--text3); }

.wa-order-btn {
  width: 100%;
  background: var(--green2);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  padding: 16px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 20px rgba(37,211,102,0.3);
  transition: all 0.2s;
}
.wa-order-btn:active { transform: scale(0.98); }
.wa-order-btn:disabled { background: var(--text3); box-shadow: none; cursor: not-allowed; opacity: 0.7; }

.empty-cart { text-align: center; padding: 30px 0 10px; color: var(--text3); font-size: 13px; line-height: 1.8; }

/* ── SIZE PICKER SHEET ───────────────────────────────────── */
.size-sheet-bg {
  position: fixed; inset: 0;
  background: rgba(28,17,10,0.5);
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.size-sheet-bg.open { opacity: 1; pointer-events: all; }
.size-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 40px;
  z-index: 600;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
}
.size-sheet-bg.open .size-sheet { transform: translateY(0); }
.size-sheet-title { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
.size-sheet-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
.size-options { display: flex; flex-direction: column; gap: 8px; }
.size-opt {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.size-opt:active { background: var(--bg3); }
.size-opt-left {}
.size-opt-name { font-size: 14px; font-weight: 600; color: var(--text); }
.size-opt-oz { font-size: 11px; color: var(--text3); }
.size-opt-price { font-size: 17px; font-weight: 800; color: var(--accent); font-family: var(--font-display); }
.size-cancel {
  margin-top: 8px;
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text2);
  cursor: pointer;
}

/* ── ADDONS SHEET ────────────────────────────────────────── */
.addon-group { margin-bottom: 14px; }
.addon-group-label {
  font-size: 11px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.addon-required {
  font-size: 9px; background: var(--accent); color: var(--surface);
  padding: 2px 7px; border-radius: 10px; font-weight: 700;
  letter-spacing: 0; text-transform: uppercase;
}
.addon-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 6px;
  cursor: pointer; font-size: 14px; color: var(--text);
  font-family: var(--font-body);
}
.addon-opt input[type=radio],
.addon-opt input[type=checkbox] { accent-color: var(--accent); width: 18px; height: 18px; flex-shrink: 0; }
.addon-toggle { justify-content: space-between; }
.addon-toggle-name { flex: 1; }
.addon-price { font-weight: 700; color: var(--accent); font-size: 14px; }
.addon-confirm-btn {
  width: 100%; background: var(--accent); color: var(--surface);
  border: none; border-radius: var(--radius-md); padding: 15px;
  font-family: var(--font-body); font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 12px; transition: all 0.2s;
}
.addon-confirm-btn:active { transform: scale(0.98); }
.cart-row-addons { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ── LOADER ──────────────────────────────────────────────── */
.loader-wrap {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  gap: 16px;
  transition: opacity 0.4s;
}
.loader-wrap.hidden { opacity: 0; pointer-events: none; }
.loader-logo {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 900;
  color: var(--primary);
}
.loader-logo span { color: var(--accent); }
.loader-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── IMAGE LIGHTBOX ──────────────────────────────────────── */
.img-lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.img-lightbox.open { opacity: 1; pointer-events: all; }
.img-lightbox img {
  max-width: 94vw; max-height: 88vh;
  border-radius: 12px; object-fit: contain;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.card-img.has-photo { cursor: zoom-in; }

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section { animation: fadeUp 0.35s ease both; }
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════
// CONFIG  (values come from config.js)
// ════════════════════════════════════════════════════════════
const FB_URL  = APP_CONFIG.firebase.url;
const FB_ROOT = APP_CONFIG.firebase.root;
const WA_NUM  = APP_CONFIG.store.phone;
const CUR     = APP_CONFIG.store.currency;

// ════════════════════════════════════════════════════════════
// DEFAULT DATA (used if Firebase empty)
// ════════════════════════════════════════════════════════════
const DEFAULT_CONFIG = {
  store: {
    name:       APP_CONFIG.store.name,
    slogan:     APP_CONFIG.store.slogan,
    phone:      APP_CONFIG.store.phone,
    hours:      APP_CONFIG.store.hours,
    isOpen:     true,
    logo_url:   '',
    sizeLegend: APP_CONFIG.store.sizeLegend,
  },
  theme: APP_CONFIG.defaultTheme
};

const DEFAULT_MENU = APP_CONFIG.defaultMenu;

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let storeConfig   = null;
let menuData      = null;
let cart          = []; // { uid, id, name, size, oz, price, addons }
let cartUid       = 0;
let sizePending   = null;
let addonsPending = null; // { item, size, oz, price }

// ════════════════════════════════════════════════════════════
// FIREBASE HELPERS WITH TIMEOUT & PARALLEL FETCHING
// ════════════════════════════════════════════════════════════
function fetchWithTimeout(url, ms = 5000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

async function fbGet(path) {
  try {
    const r = await fetchWithTimeout(`${FB_URL}/${FB_ROOT}/${path}.json`);
    return await r.json();
  } catch { return null; }
}

// Returns { data, ok } — ok=false means network/timeout failure (data is NOT confirmed empty)
async function fbGetSafe(path) {
  try {
    const r = await fetchWithTimeout(`${FB_URL}/${FB_ROOT}/${path}.json`);
    return { data: await r.json(), ok: true };
  } catch { return { data: null, ok: false }; }
}

async function fbSet(path, data) {
  try {
    await fetch(`${FB_URL}/${FB_ROOT}/${path}.json`, {
      method: 'PUT',
      body: JSON.stringify(data)
    });
  } catch {}
}

// ════════════════════════════════════════════════════════════
// INIT — fixed to never hang
// ════════════════════════════════════════════════════════════
async function init() {
  document.getElementById('loaderLogo').textContent = APP_CONFIG.brand.appName;

  // Safety net: force-hide loader after 8 seconds no matter what
  const loaderTimeout = setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 8000);

  // Fetch config + menu in parallel instead of sequentially
  const [cfgR, themeR, itemsR, catsR] = await Promise.all([
    fbGetSafe('config/store'),
    fbGetSafe('config/theme'),
    fbGetSafe('menu/items'),
    fbGetSafe('menu/categories')
  ]);

  const cfg = cfgR.data, theme = themeR.data, items = itemsR.data, cats = catsR.data;

  storeConfig = cfg ? { ...DEFAULT_CONFIG.store, ...cfg } : { ...DEFAULT_CONFIG.store };
  applyTheme(theme || DEFAULT_CONFIG.theme);

  // Backfill new config fields (type, style, sub, title…) into existing Firebase records.
  // Firebase values always win — gaps are filled from config defaults.
  const configCatById  = {};
  DEFAULT_MENU.categories.forEach(c => configCatById[c.id] = c);
  const configItemById = {};
  DEFAULT_MENU.items.forEach(i => configItemById[i.id] = i);

  menuData = {
    categories: cats
      ? Object.values(cats).map(cat => ({ ...(configCatById[cat.id] || {}), ...cat }))
      : DEFAULT_MENU.categories,
    items: items
      ? Object.values(items).map(item => ({ ...(configItemById[item.id] || {}), ...item }))
      : DEFAULT_MENU.items
  };

  // Only seed Firebase when the fetch actually reached the server AND the path is empty.
  // If ok=false (network/timeout error), do NOT overwrite — data may exist on Firebase.
  if (cfgR.ok && !cfg)    fbSet('config/store', DEFAULT_CONFIG.store);
  if (themeR.ok && !theme) fbSet('config/theme', DEFAULT_CONFIG.theme);
  if (itemsR.ok && !items) { const obj = {}; DEFAULT_MENU.items.forEach(i => obj[i.id] = i); fbSet('menu/items', obj); }
  if (catsR.ok && !cats)  { const obj = {}; DEFAULT_MENU.categories.forEach(c => obj[c.id] = c); fbSet('menu/categories', obj); }

  renderHeader();
  renderMenu();

  clearTimeout(loaderTimeout);
  document.getElementById('loader').classList.add('hidden');
}

// ════════════════════════════════════════════════════════════
// THEME ENGINE
// ════════════════════════════════════════════════════════════
function applyTheme(t) {
  const r = document.documentElement.style;
  if (t.bg)           r.setProperty('--bg', t.bg);
  if (t.bg2)          r.setProperty('--bg2', t.bg2);
  if (t.bg3)          r.setProperty('--bg3', t.bg3);
  if (t.surface)      r.setProperty('--surface', t.surface);
  if (t.primary)      r.setProperty('--primary', t.primary);
  if (t.accent)       r.setProperty('--accent', t.accent);
  if (t.accent2)      r.setProperty('--accent2', t.accent2);
  if (t.text)         r.setProperty('--text', t.text);
  if (t.text2)        r.setProperty('--text2', t.text2);
  if (t.text3)        r.setProperty('--text3', t.text3);
  if (t.font_display) r.setProperty('--font-display', t.font_display);
  if (t.font_body)    r.setProperty('--font-body', t.font_body);
}

// ════════════════════════════════════════════════════════════
// RENDER HEADER
// ════════════════════════════════════════════════════════════
function renderHeader() {
  const c = storeConfig;
  document.title = c.name;
  document.getElementById('storeName').textContent  = c.name;
  document.getElementById('storeSlogan').textContent = c.slogan;
  document.getElementById('hoursText').textContent  = c.hours;

  const logoEl = document.getElementById('logoImg');
  if (c.logo_url) {
    logoEl.innerHTML = `<img src="${c.logo_url}" alt="logo">`;
  } else {
    logoEl.textContent = c.name.charAt(0);
  }

  const pill = document.getElementById('statusPill');
  const text = document.getElementById('statusText');
  const banner = document.getElementById('closedBanner');
  if (c.isOpen) {
    pill.className = 'status-pill open';
    text.textContent = 'Open';
    banner.classList.remove('visible');
  } else {
    pill.className = 'status-pill closed';
    text.textContent = 'Closed';
    banner.classList.add('visible');
  }

  // Category tabs
  const nav = document.getElementById('catNav');
  nav.innerHTML = '';
  menuData.categories.forEach((cat, i) => {
    const tab = document.createElement('div');
    tab.className = 'cat-tab' + (i === 0 ? ' active' : '');
    tab.textContent = cat.label;
    tab.onclick = () => {
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('sec-' + cat.id)?.scrollIntoView({ behavior: 'smooth' });
    };
    nav.appendChild(tab);
  });
}

// ════════════════════════════════════════════════════════════
// RENDER MENU
// ════════════════════════════════════════════════════════════
function renderMenu() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  menuData.categories.forEach(cat => {
    const items = menuData.items.filter(i => i.cat === cat.id);
    if (!items.length) return;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-' + cat.id;

    // Detect category traits from config fields (no hardcoded category IDs)
    const isFeatured = cat.style === 'featured';
    const isDrinks   = cat.type === 'drinks';
    const hasSubs    = items.some(i => i.sub);

    sec.innerHTML = `
      <div class="section-label">${cat.emoji || ''} ${cat.label}</div>
      <div class="section-title">${cat.title || cat.label}</div>
      ${cat.subtitle ? `<div class="section-sub">${cat.subtitle}</div>` : ''}
      ${isDrinks ? `<div class="size-legend">${(storeConfig.sizeLegend || []).map(s => `<div class="size-chip">${s}</div>`).join('')}</div>` : ''}`;

    // Featured categories render inside a dark premium wrapper
    let container = sec;
    if (isFeatured) {
      const wrap = document.createElement('div');
      wrap.className = 'special-wrap';
      wrap.innerHTML = `<div class="special-tag">⭐ ${cat.specialTag || cat.label}</div>`;
      sec.appendChild(wrap);
      container = wrap;
    }

    if (hasSubs) {
      // Group items by their sub field, preserving insertion order
      const groups = {};
      const order  = [];
      items.forEach(i => {
        const key = i.sub || '';
        if (!groups[key]) { groups[key] = []; if (key) order.push(key); }
        groups[key].push(i);
      });
      // Items without a sub come first (no header)
      if (groups['']) {
        const list = document.createElement('div');
        list.className = 'menu-list';
        groups[''].forEach(item => list.appendChild(makeCard(item)));
        container.appendChild(list);
      }
      // Then each named subsection
      [...new Set(order)].forEach(key => {
        const t = document.createElement('div');
        t.className = 'subsection-title';
        t.textContent = key;
        container.appendChild(t);
        const list = document.createElement('div');
        list.className = 'menu-list';
        groups[key].forEach(item => list.appendChild(makeCard(item)));
        container.appendChild(list);
      });
      // Append addons list if category is configured to show them
      if (cat.showAddons && APP_CONFIG.store.foodAddons?.length) {
        const addonsTitle = document.createElement('div');
        addonsTitle.className = 'subsection-title';
        addonsTitle.textContent = 'Add-ons';
        container.appendChild(addonsTitle);
        APP_CONFIG.store.foodAddons.forEach(addon => {
          const row = document.createElement('div');
          row.className = 'addon-row';
          row.innerHTML = `<span>${addon.name}</span><span class="addon-price">+${CUR}${addon.price}</span>`;
          container.appendChild(row);
        });
      }
    } else {
      const list = document.createElement('div');
      list.className = 'menu-list';
      items.forEach(item => list.appendChild(makeCard(item)));
      container.appendChild(list);
    }

    main.appendChild(sec);
  });

  observeSections();
}

function makeCard(item) {
  const isDrink = item.hot != null || item.cold != null || item.frappe != null;
  const qty = cartQty(item.id);
  const card = document.createElement('div');
  card.className = 'menu-card' + (item.avail === false ? ' unavailable' : '') + (qty > 0 ? ' has-items' : '');
  card.id = 'card-' + item.id;

  // Image/emoji
  const imgHtml = item.img_url
    ? `<div class="card-img has-photo" onclick="openImgLightbox('${item.img_url.replace(/'/g,"\\'")}')"><img src="${item.img_url}" alt="${item.name}" loading="lazy"></div>`
    : `<div class="card-img">${item.emoji || '🍽️'}</div>`;

  // Prices
  let priceHtml = '';
  if (isDrink) {
    const sizes = [];
    if (item.hot   != null) sizes.push({ sz:'Hot',    val: item.hot });
    if (item.cold  != null) sizes.push({ sz:'Cold',   val: item.cold });
    if (item.frappe!= null) sizes.push({ sz:'Frappé', val: item.frappe });
    priceHtml = sizes.map(s =>
      `<div class="price-badge"><span class="price-sz">${s.sz}</span><span class="price-val">${CUR}${s.val}</span></div>`
    ).join('');
  } else {
    priceHtml = `<span class="price-single">${CUR} ${Number(item.price).toFixed(2)}</span>`;
  }

  if (item.avail === false) {
    priceHtml = `<span class="unavail-badge">Sold Out</span>`;
  }

  // Qty control
  let qtyHtml = '';
  if (item.avail !== false && storeConfig.isOpen !== false) {
    if (qty === 0) {
      qtyHtml = `<div class="qty-wrap">
        <button class="qty-btn add-first" onclick="handleAdd(event,'${item.id}')">+</button>
      </div>`;
    } else {
      qtyHtml = `<div class="qty-wrap">
        <div class="qty-control">
          <button class="qty-btn" onclick="handleRemove(event,'${item.id}')">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="handleAdd(event,'${item.id}')">+</button>
        </div>
      </div>`;
    }
  }

  card.innerHTML = `
    ${imgHtml}
    <div class="card-body">
      <div class="card-name">${item.name}</div>
      ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
      <div class="card-prices">${priceHtml}</div>
    </div>
    ${qtyHtml}`;

  return card;
}

function refreshCard(itemId) {
  const item = menuData.items.find(i => i.id === itemId);
  if (!item) return;
  const old = document.getElementById('card-' + itemId);
  if (!old) return;
  const fresh = makeCard(item);
  old.replaceWith(fresh);
}

// ════════════════════════════════════════════════════════════
// CART LOGIC
// ════════════════════════════════════════════════════════════
function cartQty(itemId) {
  return cart.filter(c => c.id === itemId).length;
}

function handleAdd(e, itemId) {
  e.stopPropagation();
  const item = menuData.items.find(i => i.id === itemId);
  if (!item) return;
  const isDrink = item.hot != null || item.cold != null || item.frappe != null;
  const hasAddons = item.addons && item.addons.length > 0;
  if (isDrink) {
    const sizes = [];
    const leg = storeConfig.sizeLegend || [];
    const lastToken = s => (s || '').split(' ').pop();
    const defHotOz    = item.hot_oz    || lastToken(leg[0]) || '8oz';
    const defColdOz   = item.cold_oz   || lastToken(leg[1]) || '12oz';
    const defFrappeOz = item.frappe_oz || lastToken(leg[2]) || '16oz';
    if (item.hot    != null) sizes.push({ label:'Hot',    oz: defHotOz,    price: item.hot });
    if (item.cold   != null) sizes.push({ label:'Cold',   oz: defColdOz,   price: item.cold });
    if (item.frappe != null) sizes.push({ label:'Frappé', oz: defFrappeOz, price: item.frappe });
    if (sizes.length === 1) {
      if (hasAddons) openAddonsSheet(item, sizes[0].label, sizes[0].oz, sizes[0].price);
      else           addToCart(item, sizes[0].label, sizes[0].oz, sizes[0].price, []);
    } else {
      openSizeSheet(item, sizes);
    }
  } else {
    if (hasAddons) openAddonsSheet(item, null, null, item.price);
    else           addToCart(item, null, null, item.price, []);
  }
}

function handleRemove(e, itemId) {
  e.stopPropagation();
  // Remove last added instance of this item
  const idx = cart.map(c => c.id).lastIndexOf(itemId);
  if (idx >= 0) { cart.splice(idx, 1); updateCartUI(); refreshCard(itemId); }
}

function addToCart(item, size, oz, basePrice, addons) {
  addons = addons || [];
  const addonTotal = addons.reduce((s, a) => s + (Number(a.price) || 0), 0);
  cart.push({ uid: cartUid++, id: item.id, name: item.name, size, oz, price: Number(basePrice) + addonTotal, addons });
  updateCartUI();
  refreshCard(item.id);
}

function removeByUid(uid) {
  const item = cart.find(c => c.uid === uid);
  cart = cart.filter(c => c.uid !== uid);
  updateCartUI();
  if (item) refreshCard(item.id);
  renderCartSheet();
}

function updateCartUI() {
  const total = cart.reduce((s, c) => s + c.price, 0);
  const count = cart.length;
  const fab = document.getElementById('fabBtn');
  document.getElementById('fabCount').textContent = count;
  document.getElementById('fabTotal').textContent = CUR + ' ' + total.toFixed(2);
  if (count > 0 && storeConfig?.isOpen !== false) fab.classList.add('visible');
  else                                            fab.classList.remove('visible');
}

// ════════════════════════════════════════════════════════════
// SIZE SHEET
// ════════════════════════════════════════════════════════════
function openSizeSheet(item, sizes) {
  sizePending = { item, sizes };
  document.getElementById('sizeSheetTitle').textContent = item.name;
  const opts = document.getElementById('sizeSheetOptions');
  opts.innerHTML = '';
  sizes.forEach(s => {
    const d = document.createElement('div');
    d.className = 'size-opt';
    d.innerHTML = `
      <div class="size-opt-left">
        <div class="size-opt-name">${s.label}</div>
        <div class="size-opt-oz">${s.oz}</div>
      </div>
      <div class="size-opt-price">${CUR} ${s.price}</div>`;
    d.onclick = () => {
      closeSizeSheet();
      if (item.addons && item.addons.length) openAddonsSheet(item, s.label, s.oz, s.price);
      else addToCart(item, s.label, s.oz, s.price, []);
    };
    opts.appendChild(d);
  });
  document.getElementById('sizeSheet').classList.add('open');
}

function closeSizeSheet() {
  document.getElementById('sizeSheet').classList.remove('open');
  sizePending = null;
}

function handleSizeBgClick(e) {
  if (e.target === document.getElementById('sizeSheet')) closeSizeSheet();
}

// ════════════════════════════════════════════════════════════
// ADDONS SHEET
// ════════════════════════════════════════════════════════════
function openAddonsSheet(item, size, oz, price) {
  addonsPending = { item, size, oz, price };
  document.getElementById('addonsSheetTitle').textContent = item.name;
  const sub = size ? `${size} · ${oz}  —  ${CUR} ${Number(price).toFixed(2)}` : `${CUR} ${Number(price).toFixed(2)}`;
  document.getElementById('addonsSheetSub').textContent = sub;

  const opts = document.getElementById('addonsSheetOpts');
  opts.innerHTML = '';
  item.addons.forEach(addon => {
    const group = document.createElement('div');
    group.className = 'addon-group';
    if (addon.type === 'select') {
      group.innerHTML = `<div class="addon-group-label">${addon.name} <span class="addon-required">Required</span></div>`;
      (addon.options || []).forEach((opt, idx) => {
        const lbl = document.createElement('label');
        lbl.className = 'addon-opt';
        lbl.innerHTML = `<input type="radio" name="addon_${addon.id}" value="${opt}" ${idx === 0 ? 'checked' : ''}><span>${opt}</span>`;
        group.appendChild(lbl);
      });
    } else {
      const lbl = document.createElement('label');
      lbl.className = 'addon-opt addon-toggle';
      lbl.innerHTML = `<input type="checkbox" id="addon_${addon.id}"><span class="addon-toggle-name">${addon.name}</span><span class="addon-price">+RM${addon.price}</span>`;
      group.appendChild(lbl);
    }
    opts.appendChild(group);
  });
  document.getElementById('addonsSheet').classList.add('open');
}

function confirmAddons() {
  if (!addonsPending) return;
  const { item, size, oz, price } = addonsPending;
  const selectedAddons = [];
  (item.addons || []).forEach(addon => {
    if (addon.type === 'select') {
      const sel = document.querySelector(`input[name="addon_${addon.id}"]:checked`);
      if (sel) selectedAddons.push({ name: addon.name, value: sel.value, price: 0 });
    } else {
      const cb = document.getElementById(`addon_${addon.id}`);
      if (cb && cb.checked) selectedAddons.push({ name: addon.name, value: 'Yes', price: Number(addon.price) || 0 });
    }
  });
  closeAddonsSheet();
  addToCart(item, size, oz, price, selectedAddons);
}

function closeAddonsSheet() {
  document.getElementById('addonsSheet').classList.remove('open');
  addonsPending = null;
}

function handleAddonsBgClick(e) {
  if (e.target === document.getElementById('addonsSheet')) closeAddonsSheet();
}

// ════════════════════════════════════════════════════════════
// IMAGE LIGHTBOX
// ════════════════════════════════════════════════════════════
function openImgLightbox(src) {
  if (!src) return;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('imgLightbox').classList.add('open');
}
function closeImgLightbox() {
  document.getElementById('imgLightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}

// ════════════════════════════════════════════════════════════
// CART SHEET
// ════════════════════════════════════════════════════════════
function openCart() {
  renderCartSheet();
  document.getElementById('cartSheet').classList.add('open');
}

function handleSheetBgClick(e) {
  if (e.target === document.getElementById('cartSheet')) document.getElementById('cartSheet').classList.remove('open');
}

function renderCartSheet() {
  const total = cart.reduce((s, c) => s + c.price, 0);
  document.getElementById('cartSheetCount').textContent = cart.length + ' item' + (cart.length !== 1 ? 's' : '');
  document.getElementById('cartTotalVal').textContent = CUR + ' ' + total.toFixed(2);
  const orderBtn = document.getElementById('waOrderBtn');
  if (storeConfig?.isOpen === false) {
    orderBtn.disabled = true;
    orderBtn.textContent = 'We\'re currently closed — orders unavailable';
  } else {
    orderBtn.disabled = false;
  }
  const list = document.getElementById('cartItemsList');
  if (cart.length === 0) {
    list.innerHTML = '<div class="empty-cart">Your cart is empty 🛒<br>Add something delicious from the menu</div>';
    return;
  }
  list.innerHTML = '';
  cart.forEach(item => {
    const row = document.createElement('div');
    row.className = 'cart-row';
    const addonsStr = (item.addons || []).map(a => `${a.name}: ${a.value}`).join(' · ');
    row.innerHTML = `
      <div class="cart-row-info">
        <div class="cart-row-name">${item.name}</div>
        ${item.size ? `<div class="cart-row-size">${item.size} · ${item.oz}</div>` : ''}
        ${addonsStr ? `<div class="cart-row-addons">${addonsStr}</div>` : ''}
      </div>
      <span class="cart-row-price">${CUR} ${item.price.toFixed(2)}</span>
      <button class="cart-row-del" onclick="removeByUid(${item.uid})">×</button>`;
    list.appendChild(row);
  });
}

// ════════════════════════════════════════════════════════════
// SEND ORDER
// ════════════════════════════════════════════════════════════
async function sendOrder() {
  if (!cart.length || storeConfig?.isOpen === false) return;
  const name  = document.getElementById('custName').value.trim() || 'Customer';
  const note  = document.getElementById('custNote').value.trim();
  const total = cart.reduce((s, c) => s + c.price, 0);
  const phone = storeConfig?.phone || WA_NUM;

  let msg = `🍵 *Order – ${storeConfig?.name || APP_CONFIG.store.name}*\n`;
  msg += `👤 ${name}\n\n*Items:*\n`;
  cart.forEach((item, i) => {
    msg += `${i+1}. ${item.name}${item.size ? ` (${item.size})` : ''} — ${CUR} ${item.price.toFixed(2)}\n`;
    (item.addons || []).forEach(a => {
      msg += `   • ${a.name}: ${a.value}${a.price ? ` (+${CUR}${a.price})` : ''}\n`;
    });
  });
  msg += `\n💰 *Total: ${CUR} ${total.toFixed(2)}*`;
  if (note) msg += `\n\n📝 ${note}`;
  msg += `\n\n_via ${APP_CONFIG.brand.appName} menu_`;

  // Open WhatsApp synchronously while still inside the click handler —
  // mobile browsers (iOS Safari, Android Chrome) block window.open()
  // called after any await, treating it as an unsolicited popup.
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');

  // Log to Firebase in the background — no need to block on this.
  logOrder({ name, items: cart.map(i => ({ name:i.name, size:i.size, price:i.price, addons:i.addons })), total, note, ts: Date.now() });
}

async function logOrder(order) {
  try {
    const snap = await fbGet('orders');
    let orders = snap ? Object.entries(snap).map(([k,v]) => ({ key:k, ...v })) : [];
    // ring buffer: keep max 1000
    if (orders.length >= 1000) {
      orders.sort((a,b) => a.ts - b.ts);
      const oldest = orders[0].key;
      await fetch(`${FB_URL}/${FB_ROOT}/orders/${oldest}.json`, { method:'DELETE' });
    }
    const newKey = 'ord_' + Date.now();
    await fbSet('orders/' + newKey, order);
  } catch {}
}

// ════════════════════════════════════════════════════════════
// INTERSECTION OBSERVER (nav highlight)
// ════════════════════════════════════════════════════════════
function observeSections() {
  const tabs = document.querySelectorAll('.cat-tab');
  const ids  = menuData.categories.map(c => c.id);
  const obs  = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = ids.indexOf(entry.target.id.replace('sec-', ''));
        if (idx >= 0) {
          tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
          tabs[idx]?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
        }
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  ids.forEach(id => { const el = document.getElementById('sec-' + id); if (el) obs.observe(el); });
}

// ════════════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════════════
init();
</script>
