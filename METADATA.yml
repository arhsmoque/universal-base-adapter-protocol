component: "universal-base-adapter-protocol"
version: "1.5.4"
schema_version: "1.0"
protocol: "Universal Base/Adapter Design and Coding Protocol v1.5"
conformance_level: 4
surface: "docs"
risk_class: "read_only"
risk_modifiers: []
status: "active"
owner: "ARH governance"
review_cadence: "on protocol change or quarterly"

architecture:
  base: "UNIVERSAL_BASE_ADAPTER_PROTOCOL.md"
  adapters: ["adapters/"]
  rules_config: "GOVERNANCE_IMPLEMENTATION_GUIDE.md"
  ports: []

salvage:
  decision: "build_from_scratch"
  source: "local protocol review and external standards validation"
  version: "v1.5"
  license: ""
  rationale: "Cross-agent governance baseline for design-domain adapters."
  provenance: "JOURNAL.md and EMERGING_PATTERN_VETTING_NOTE_v1_5.md"
  smoke_test: "python scripts/check_conformance.py . --level 4 --json"
  rollback_path: "revert to prior protocol package version and keep review decision note"

contracts:
  input_schema: "schemas/metadata.schema.json"
  output_schema: "schemas/conformance-linter-output.schema.json"
  error_taxonomy: "CONFORMANCE_LINTER_SPEC.md findings"
  idempotency: "read-only documentation and validation package"
  dry_run: false
  approval_required: false

budget:
  max_tokens: null
  max_pages: null
  max_bytes: null
  max_cost_usd: null

commands:
  install: "no external dependencies"
  test: "python -m py_compile scripts/check_conformance.py"
  lint: "python scripts/check_conformance.py . --level 4 --json"
  format: ""
  smoke: "python scripts/check_conformance.py . --level 1 --json"
  dry_run: ""
  replay: "python scripts/check_conformance.py . --level 4 --json"
  housekeeping: ""

observability:
  trace_id: true
  event_log: "conformance checker JSON output"
  failure_artifacts: "conformance checker findings"
  continuation_packet: "findings[].agent_action"
  semconv_version: "1.40"
  semconv_namespace: "gen_ai"

housekeeping:
  scratch_paths: []
  archive_policy: "90 days unless marked permanent-reference"
  discovery_pollution_check: "find scratch/candidate/temp files before promotion"

escape_hatches: []
