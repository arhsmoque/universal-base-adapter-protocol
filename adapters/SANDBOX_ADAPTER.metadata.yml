component: "sandbox-adapter"
version: "1.5.0"
schema_version: "1.0"
protocol: "Universal Base/Adapter Design and Coding Protocol v1.5"
conformance_level: 2
surface: "sandbox"
risk_class: "external_mutation"
risk_modifiers: ["generated_code_execution", "filesystem_broad_scope", "network_access"]
status: "experimental"
